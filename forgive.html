<!DOCTYPE html>
<html>
<head>
<title>Will You Forgive Me?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;
background:linear-gradient(135deg,#f6f7fb,#e9ecf5);
overflow:hidden;
}

.container{
background:white;
padding:50px;
width:500px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#333;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.yes{
background:#6c8ed9;
color:white;
}

.no{
background:#ddd;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Will You Forgive Me? ❤️</h1>

<p>I promise to do better.</p>

<button class="yes" onclick="yesClick()">Yes</button>
<button class="no" onmouseover="moveButton()">No</button>

</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

function yesClick(){
alert("Thank you ❤️ You made me the happiest person!");
}

function moveButton(){
const button=document.querySelector(".no");

button.style.position="absolute";
button.style.left=Math.random()*80+"%";
button.style.top=Math.random()*80+"%";
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,500);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forgive Me</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.container{
background:white;
padding:50px;
width:520px;
border-radius:12px;
text-align:center;
}

button{
margin-top:20px;
padding:14px 26px;
border:none;
border-radius:6px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e63950;
}

</style>
</head>

<body>

<div class="container">

<h1>Will You Forgive Me? ❤️</h1>

<button onclick="celebrate()">Yes</button>

</div>

<script>
function celebrate(){
document.body.innerHTML="<h1 style='color:white;text-align:center'>Thank You For Forgiving Me ❤️🥰</h1>";
}
</script>

</body>
</html>

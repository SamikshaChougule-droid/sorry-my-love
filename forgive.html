<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forgive Me</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:150px;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

h1{color:white}

button{
padding:15px 26px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Will You Forgive Me? 🥺❤️</h1>

<button onclick="celebrate()">Yes ❤️</button>

<script>
function celebrate(){
document.body.innerHTML="<h1 style='color:white'>Thank You For Forgiving Me ❤️🥰</h1>";

for(let i=0;i<150;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize="25px";
document.body.appendChild(heart);
}
}
</script>

</body>
</html>

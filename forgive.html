<!DOCTYPE html>
<html>
<head>
<title>Forgive Me</title>

<style>

body{
margin-top:150px;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Will You Forgive Me? 🥺❤️</h1>

<button onclick="yes()">Yes ❤️</button>

<script>

function yes(){

document.body.innerHTML="<h1>Thank You For Forgiving Me ❤️🥰</h1>";

for(let i=0;i<200;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize="25px";
document.body.appendChild(heart);
}

}

</script>

</body>
</html>

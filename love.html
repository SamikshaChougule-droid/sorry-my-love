<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Why I Love You</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
background:#ffc2d1;
}

h1{color:#ff4d6d}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Reasons I Love You ❤️</h1>

<p id="reasonText">Click the button</p>

<button onclick="showReason()">Show Reason 💕</button>
<br>
<button onclick="nextPage()">Next</button>

<script>

let reasons=[
"You always make me smile 😊",
"You care about me",
"You support me",
"You understand me",
"You make my life happier",
"You are my favorite person",
"You make ordinary days special",
"I feel safe with you",
"You make my world beautiful ❤️",
"Sweet little Bunny I Love the most in This Life...💋❤",
"I Love youu so much My Darling..😚💕"
];

function showReason(){
document.getElementById("reasonText").innerText=
reasons[Math.floor(Math.random()*reasons.length)];
}

function nextPage(){
window.location.href="quiz.html";
}

</script>

</body>
</html>

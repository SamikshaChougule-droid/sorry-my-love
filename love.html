<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Why I Love You</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins, sans-serif;
background:#f6f7fb;
}

.container{
background:white;
padding:50px;
width:520px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#333;
}

p{
color:#666;
}

button{
margin-top:15px;
padding:12px 24px;
border:none;
border-radius:6px;
background:#6c8ed9;
color:white;
cursor:pointer;
}

button:hover{
background:#567ad0;
}

</style>
</head>

<body>

<div class="container">

<h1>Reasons I Love You ❤️</h1>

<p id="reason">Click the button to see one reason.</p>

<button onclick="showReason()">Show Reason</button>
<br>
<button onclick="nextPage()">Next</button>

</div>

<script>

let reasons=[
"You always make me smile",
"You care about me",
"You support me",
"You make my life happier",
"You understand me",
"You are my favorite person",
"You make ordinary days special"
];

function showReason(){
document.getElementById("reason").innerText=
reasons[Math.floor(Math.random()*reasons.length)];
}

function nextPage(){
window.location.href="quiz.html";
}

</script>

</body>
</html>

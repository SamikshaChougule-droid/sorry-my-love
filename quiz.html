<!DOCTYPE html>
<html>
<head>
<title>Little Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f6f7fb,#e9ecf5);
font-family:Poppins;
}

.container{
background:white;
padding:50px;
width:520px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#333;
}

.question{
margin-top:20px;
font-size:18px;
color:#555;
}

button{
margin:10px;
padding:12px 25px;
border:none;
border-radius:6px;
background:#6c8ed9;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>Little Quiz 💭</h1>

<div class="question">
Did I ever make you smile?
</div>

<button onclick="next()">Yes</button>
<button onclick="next()">Of course</button>

<div class="question">
Do our memories matter?
</div>

<button onclick="next()">Yes</button>
<button onclick="next()">They do</button>

<div class="question">
Should I get one more chance?
</div>

<button onclick="finish()">Maybe</button>
<button onclick="finish()">Yes</button>

</div>

<script>

function next(){
alert("Thank you for answering ❤️")
}

function finish(){
window.location.href="forgive.html"
}

</script>

</body>
</html>

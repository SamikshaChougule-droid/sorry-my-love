<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Cute Quiz For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#f6f7fb,#e9ecf5);
}

.container{
background:white;
padding:40px;
width:520px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h1{
font-size:34px;
color:#333;
margin-bottom:10px;
}

#question{
font-size:20px;
color:#555;
margin:20px 0;
}

.option{
display:block;
width:100%;
margin:8px 0;
padding:12px;
font-size:16px;
border:none;
border-radius:6px;
background:#6c8ed9;
color:white;
cursor:pointer;
transition:0.3s;
}

.option:hover{
background:#567ad0;
}

#nextBtn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:6px;
background:#ff6b6b;
color:white;
font-size:16px;
cursor:pointer;
display:none;
}

#score{
margin-top:15px;
font-size:18px;
color:#444;
}

</style>
</head>


<body>

<div class="container">

<h1>Small Quiz About Us 💌</h1>

<div id="question"></div>

<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">Next ➜</button>

<div id="score"></div>

</div>


<script>

const quiz = [
{
question:"How important are you to me? 🥺",
answers:[
{text:"Just a normal friend", correct:false},
{text:"Someone I know", correct:false},
{text:"Someone very special 💖", correct:true},
{text:"I don't know", correct:false}
]
},

{
question:"What do I miss the most? 💭",
answers:[
{text:"Your smile 😊", correct:true},
{text:"Nothing", correct:false},
{text:"Your phone", correct:false},
{text:"Your homework", correct:false}
]
},

{
question:"Why did I make this website? 💌",
answers:[
{text:"To say sorry", correct:true},
{text:"For fun", correct:false},
{text:"For coding practice", correct:false},
{text:"By mistake", correct:false}
]
}

];

let currentQuestion = 0;
let score = 0;

function showQuestion(){

let q = quiz[currentQuestion];

document.getElementById("question").innerText = q.question;

let answersHTML = "";

q.answers.forEach((a,i)=>{
answersHTML += `<button class="option" onclick="selectAnswer(${a.correct})">${a.text}</button>`;
});

document.getElementById("answers").innerHTML = answersHTML;

}

function selectAnswer(correct){

if(correct){
score++;
}

document.getElementById("nextBtn").style.display="inline-block";

}

function nextQuestion(){

currentQuestion++;

document.getElementById("nextBtn").style.display="none";

if(currentQuestion < quiz.length){
showQuestion();
}
else{

document.getElementById("question").innerHTML="Quiz Finished 💖";

document.getElementById("answers").innerHTML=
`<p>You scored ${score} / ${quiz.length} 🥺</p>
<p>No matter the score, you are still very special to me 💞</p>
<button onclick="goNext()" class="option">Continue 💌</button>`;

}

}

function goNext(){
window.location.href="love.html";
}

showQuestion();

</script>


</body>
</html>
